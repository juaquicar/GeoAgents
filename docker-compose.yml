version: "3.9"

services:

  postgis:
    image: postgis/postgis:16-3.4
    container_name: geoagents_postgis
    restart: always
    environment:
      POSTGRES_DB: geoagents
      POSTGRES_USER: geoagents
      POSTGRES_PASSWORD: geoagents
    ports:
      - "5433:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data

volumes:
  postgis_data: